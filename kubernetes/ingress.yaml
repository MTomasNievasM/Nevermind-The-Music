apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tienda-musica-ingress
  namespace: tienda-musica
spec:
  rules:
    - host: nevermindthemusic.es
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
    - host: www.nevermindthemusic.es
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
